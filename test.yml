name: Run PowerShell Script

on:
  workflow_dispatch:
    inputs:
      firstname:
        description: "Enter the first name"
        required: true
        type: string
      lastname:
        description: "Enter the last name"
        required: true
        type: string

jobs:
  run-powershell:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run PowerShell Script with Inputs
        shell: pwsh
        run: |
          Write-Host "The entered username is: ${{ github.event.inputs.username }}"
          Write-Host "The entered user email is: ${{ github.event.inputs.useremail }}"
